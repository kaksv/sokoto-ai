<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0f172a;font-family:'Inter','Segoe UI',sans-serif">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/></marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker>
    <marker id="arrAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
    <marker id="arrGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="820" fill="#0f172a"/>
  <!-- Title -->
  <rect x="300" y="20" width="600" height="50" rx="25" fill="#05966920" stroke="#05966950" stroke-width="1"/>
  <text x="600" y="52" text-anchor="middle" fill="#10b981" font-size="22" font-weight="700" letter-spacing="2">SOKOAGENT AI — SYSTEM ARCHITECTURE</text>

  <!-- LAYER LABELS -->
  <rect x="30" y="90" width="100" height="26" rx="13" fill="#10b98120" stroke="#10b98140" stroke-width="1"/>
  <text x="80" y="108" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">LAYER 1: USERS</text>
  <rect x="30" y="275" width="100" height="26" rx="13" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
  <text x="80" y="293" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">LAYER 2: GATEWAY</text>
  <rect x="30" y="480" width="100" height="26" rx="13" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
  <text x="80" y="498" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600">LAYER 3: BACKEND</text>
  <rect x="30" y="650" width="100" height="26" rx="13" fill="#05966920" stroke="#05966940" stroke-width="1"/>
  <text x="80" y="668" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">LAYER 4: AI</text>

  <!-- FARMER PHONE BOX -->
  <rect x="70" y="130" width="180" height="130" rx="16" fill="#1e293b" stroke="#05966940" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="140" y="142" width="40" height="6" rx="3" fill="#059669"/>
  <rect x="110" y="156" width="100" height="12" rx="6" fill="#05966920"/>
  <text x="160" y="166" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">FEATURE PHONE</text>
  <text x="160" y="190" text-anchor="middle" fill="#94a3b8" font-size="11">Dial *347*1#</text>
  <text x="160" y="210" text-anchor="middle" fill="#64748b" font-size="10">USSD Session</text>
  <text x="160" y="228" text-anchor="middle" fill="#64748b" font-size="10">No internet needed</text>
  <text x="160" y="250" text-anchor="middle" fill="#64748b" font-size="9">500M+ phones supported</text>

  <!-- AFRICA'S TALKING BOX -->
  <rect x="370" y="130" width="220" height="130" rx="16" fill="#1e293b" stroke="#f59e0b40" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="158" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">Africa's Talking</text>
  <text x="480" y="178" text-anchor="middle" fill="#64748b" font-size="10">Communications Gateway</text>
  <line x1="390" y1="190" x2="570" y2="190" stroke="#f59e0b20" stroke-width="1"/>
  <text x="480" y="208" text-anchor="middle" fill="#94a3b8" font-size="11">• USSD Session Manager</text>
  <text x="480" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">• SMS Alert Gateway</text>
  <text x="480" y="244" text-anchor="middle" fill="#94a3b8" font-size="11">• Mobile Money API</text>

  <!-- EXPRESS BACKEND BOX -->
  <rect x="710" y="90" width="460" height="200" rx="16" fill="#1e293b" stroke="#3b82f640" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="940" y="118" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">Express.js Backend (Render)</text>
  <text x="940" y="138" text-anchor="middle" fill="#64748b" font-size="10">Node.js REST API — Production on Render</text>
  <line x1="730" y1="148" x2="1150" y2="148" stroke="#3b82f620" stroke-width="1"/>

  <!-- Backend sub-components -->
  <rect x="730" y="158" width="130" height="46" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="795" y="180" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">USSD Router</text>
  <text x="795" y="196" text-anchor="middle" fill="#64748b" font-size="9">Session State Machine</text>
  <rect x="875" y="158" width="130" height="46" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="940" y="180" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Agent Controller</text>
  <text x="940" y="196" text-anchor="middle" fill="#64748b" font-size="9">AI Orchestration</text>
  <rect x="1020" y="158" width="130" height="46" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="1085" y="180" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Market Cache</text>
  <text x="1085" y="196" text-anchor="middle" fill="#64748b" font-size="9">Price Aggregation</text>

  <!-- Bottom row -->
  <rect x="730" y="214" width="140" height="36" rx="6" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="800" y="236" text-anchor="middle" fill="#94a3b8" font-size="10">Session Store (Map)</text>
  <rect x="885" y="214" width="140" height="36" rx="6" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="955" y="236" text-anchor="middle" fill="#94a3b8" font-size="10">Tool Executor</text>
  <rect x="1040" y="214" width="110" height="36" rx="6" fill="#0f172a" stroke="#10b98140" stroke-width="1"/>
  <text x="1095" y="236" text-anchor="middle" fill="#34d399" font-size="10">Prices & Buyers</text>

  <!-- REACT FRONTEND BOX -->
  <rect x="70" y="310" width="220" height="170" rx="16" fill="#1e293b" stroke="#8b5cf640" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="338" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">React Dashboard</text>
  <text x="180" y="358" text-anchor="middle" fill="#64748b" font-size="10">Vite + Tailwind CSS</text>
  <line x1="85" y1="368" x2="275" y2="368" stroke="#8b5cf620" stroke-width="1"/>
  <text x="180" y="388" text-anchor="middle" fill="#94a3b8" font-size="11">• Landing Page</text>
  <text x="180" y="408" text-anchor="middle" fill="#94a3b8" font-size="11">• USSD Guide</text>
  <text x="180" y="428" text-anchor="middle" fill="#94a3b8" font-size="11">• Architecture View</text>
  <text x="180" y="448" text-anchor="middle" fill="#94a3b8" font-size="11">• Deployed on Vercel</text>
  <rect x="95" y="460" width="170" height="16" rx="4" fill="#8b5cf610" stroke="#8b5cf630" stroke-width="1"/>
  <text x="180" y="472" text-anchor="middle" fill="#a78bfa" font-size="9">sokoagent.ai</text>

  <!-- QWEN CLOUD AI BOX -->
  <rect x="340" y="310" width="520" height="170" rx="16" fill="#0f172a" stroke="#05966940" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="340" text-anchor="middle" fill="#34d399" font-size="18" font-weight="700">QwenCloud AI (DashScope)</text>
  <text x="600" y="362" text-anchor="middle" fill="#64748b" font-size="10">Alibaba Cloud — OpenAI-compatible API — qwen-max</text>
  <line x1="360" y1="372" x2="840" y2="372" stroke="#05966920" stroke-width="1"/>

  <!-- Qwen sub-components -->
  <rect x="360" y="382" width="150" height="42" rx="8" fill="#0f172a" stroke="#05966940" stroke-width="1"/>
  <text x="435" y="402" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">NLU Engine</text>
  <text x="435" y="418" text-anchor="middle" fill="#64748b" font-size="9">Parses farmer input</text>
  <rect x="525" y="382" width="150" height="42" rx="8" fill="#0f172a" stroke="#05966940" stroke-width="1"/>
  <text x="600" y="402" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Autopilot Agent</text>
  <text x="600" y="418" text-anchor="middle" fill="#64748b" font-size="9">Tool selection loop</text>
  <rect x="690" y="382" width="150" height="42" rx="8" fill="#0f172a" stroke="#05966940" stroke-width="1"/>
  <text x="765" y="402" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Response Gen</text>
  <text x="765" y="418" text-anchor="middle" fill="#64748b" font-size="9">USSD-formatted reply</text>
  <rect x="525" y="434" width="150" height="30" rx="6" fill="#0f172a" stroke="#10b98130" stroke-width="1"/>
  <text x="600" y="454" text-anchor="middle" fill="#34d399" font-size="9">Autopilot Tool Loop</text>

  <!-- ARROWS: DATA FLOW -->
  <!-- Farmer -> AT -->
  <line x1="250" y1="195" x2="350" y2="195" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrAmber)" stroke-dasharray="6,3" filter="url(#glow)"/>
  <text x="300" y="185" text-anchor="middle" fill="#f59e0b" font-size="9">Dials *347*1#</text>

  <!-- AT -> Express -->
  <line x1="590" y1="195" x2="690" y2="195" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrBlue)" filter="url(#glow)"/>
  <text x="640" y="185" text-anchor="middle" fill="#3b82f6" font-size="9">POST /ussd</text>

  <!-- Express -> Qwen -->
  <path d="M 850 290 L 850 310" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrGreen)" filter="url(#glow)"/>
  <text x="870" y="305" text-anchor="start" fill="#10b981" font-size="9">LLM API Call</text>

  <!-- Qwen -> Express (tool calls back) -->
  <path d="M 690 400 Q 850 400 955 250" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGray)"/>
  <text x="860" y="330" text-anchor="middle" fill="#64748b" font-size="8">get_market_price / find_buyers</text>

  <!-- Express -> Farmer (response round trip) -->
  <path d="M 795 290 Q 795 520 480 520 L 160 520 L 160 260" fill="none" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrAmber)" stroke-dasharray="8,4" filter="url(#glow)"/>
  <text x="480" y="515" text-anchor="middle" fill="#fbbf24" font-size="9">AI-driven USSD response back to farmer</text>

  <!-- Frontend -> Backend (future REST calls) -->
  <path d="M 290 395 Q 340 395 340 290 Q 340 195 710 195" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGray)"/>
  <text x="500" y="330" text-anchor="middle" fill="#8b5cf6" font-size="9">REST API calls (future)</text>

  <!-- LEGEND -->
  <rect x="30" y="680" width="1140" height="80" rx="12" fill="#1e293b40" stroke="#334155" stroke-width="1"/>
  <text x="60" y="703" fill="#94a3b8" font-size="12" font-weight="600">LEGEND</text>
  <line x1="60" y1="728" x2="100" y2="728" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="108" y="732" fill="#f59e0b" font-size="10">Request Flow</text>
  <line x1="280" y1="728" x2="320" y2="728" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="328" y="732" fill="#3b82f6" font-size="10">HTTP Webhook</text>
  <line x1="440" y1="728" x2="480" y2="728" stroke="#10b981" stroke-width="2.5"/>
  <text x="488" y="732" fill="#10b981" font-size="10">AI API Call</text>
  <line x1="590" y1="728" x2="630" y2="728" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="638" y="732" fill="#fbbf24" font-size="10">Response Flow</text>
  <line x1="830" y1="728" x2="870" y2="728" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="878" y="732" fill="#64748b" font-size="10">Tool Execution</text>
  <rect x="60" y="744" width="14" height="14" rx="3" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="1.5"/>
  <text x="82" y="756" fill="#64748b" font-size="9">QwenCloud</text>
  <rect x="170" y="744" width="14" height="14" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="192" y="756" fill="#64748b" font-size="9">Express Backend</text>
  <rect x="300" y="744" width="14" height="14" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="322" y="756" fill="#64748b" font-size="9">Africa's Talking</text>
  <rect x="440" y="744" width="14" height="14" rx="3" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="462" y="756" fill="#64748b" font-size="9">React Frontend</text>
  <rect x="580" y="744" width="14" height="14" rx="3" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="602" y="756" fill="#64748b" font-size="9">Data Store</text>

  <!-- Footer -->
  <text x="600" y="790" text-anchor="middle" fill="#475569" font-size="9">SokoAgent AI v1.0 — QwenCloud + Express.js + Africa's Talking + React</text>
</svg>